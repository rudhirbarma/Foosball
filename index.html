<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --green: #1a6b3a; --green-light: #2d9e56; --yellow: #f5c842;
    --white: #f0ede4; --dark: #111410; --mid: #1e2419;
    --border: rgba(245,200,66,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(245,200,66,0.02) 60px,rgba(245,200,66,0.02) 61px),
      repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(245,200,66,0.02) 60px,rgba(245,200,66,0.02) 61px);
    pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px,10vw,88px); color: var(--yellow); letter-spacing: 4px; line-height: 0.9; text-shadow: 0 0 60px rgba(245,200,66,0.25); }
  .header p { color: rgba(240,237,228,0.45); font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }
  .tabs { display: flex; gap: 4px; background: var(--mid); border-radius: 12px; padding: 4px; margin-bottom: 28px; border: 1px solid var(--border); }
  .tab { flex: 1; padding: 10px 6px; background: none; border: none; color: rgba(240,237,228,0.4); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 9px; transition: all 0.2s; }
  .tab.active { background: var(--green); color: var(--white); }
  .panel { display: none; } .panel.active { display: block; }

  .match-card { background: var(--mid); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 20px; }
  .match-card h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--yellow); margin-bottom: 22px; }
  .date-row { margin-bottom: 20px; }
  .date-row label, .player-col label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(240,237,228,0.4); margin-bottom: 8px; }
  .date-row input[type=date] { background: var(--dark); border: 1px solid rgba(245,200,66,0.2); border-radius: 10px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 12px 14px; outline: none; width: 100%; transition: border-color 0.2s; color-scheme: dark; }
  .date-row input[type=date]:focus { border-color: var(--yellow); }
  .vs-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: center; margin-bottom: 20px; }
  .player-col { display: flex; flex-direction: column; gap: 10px; }
  .player-col select, .player-col input[type=number] { background: var(--dark); border: 1px solid rgba(245,200,66,0.2); border-radius: 10px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 12px 14px; outline: none; transition: border-color 0.2s; width: 100%; -moz-appearance: textfield; }
  .player-col select:focus, .player-col input[type=number]:focus { border-color: var(--yellow); }
  .player-col input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .player-col select option { background: #1a1f17; }
  .vs-label { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: rgba(245,200,66,0.35); letter-spacing: 2px; text-align: center; }
  .btn-primary { width: 100%; padding: 14px; background: var(--green); border: none; border-radius: 10px; color: var(--white); font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
  .btn-primary:hover { background: var(--green-light); transform: translateY(-1px); }

  /* LEADERBOARD */
  .lb-toggle { display: flex; gap: 4px; background: var(--dark); border-radius: 10px; padding: 4px; margin-bottom: 20px; border: 1px solid var(--border); width: fit-content; }
  .lb-toggle-btn { padding: 8px 18px; background: none; border: none; color: rgba(240,237,228,0.4); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 7px; transition: all 0.2s; }
  .lb-toggle-btn.active { background: var(--green); color: var(--white); }
  .month-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .month-selector select { background: var(--dark); border: 1px solid rgba(245,200,66,0.2); border-radius: 8px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 12px; outline: none; }
  .month-selector select option { background: #1a1f17; }
  .month-label { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(240,237,228,0.4); }
  .lb-header { display: grid; grid-template-columns: 40px 1fr repeat(5,60px); gap: 8px; padding: 0 16px 10px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(240,237,228,0.3); border-bottom: 1px solid var(--border); margin-bottom: 6px; }
  .lb-row { display: grid; grid-template-columns: 40px 1fr repeat(5,60px); gap: 8px; align-items: center; padding: 14px 16px; background: var(--mid); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; position: relative; overflow: hidden; }
  .lb-row.gold { border-color: rgba(245,200,66,0.5); }
  .lb-row.gold::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--yellow); border-radius: 2px 0 0 2px; }
  .rank { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: rgba(240,237,228,0.25); text-align: center; }
  .lb-row.gold .rank { color: var(--yellow); }
  .lb-name { font-weight: 500; font-size: 15px; }
  .lb-row.gold .lb-name { color: var(--yellow); }
  .lb-stat { text-align: center; font-size: 14px; color: rgba(240,237,228,0.7); }
  .lb-stat.highlight { color: var(--green-light); font-weight: 600; }
  .win-bar-wrap { grid-column: span 7; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .win-bar { height: 100%; background: linear-gradient(90deg,var(--green-light),var(--yellow)); border-radius: 2px; transition: width 0.6s ease; }

  /* HISTORY */
  .history-group-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(240,237,228,0.3); padding: 14px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .history-item { display: flex; align-items: center; padding: 12px 16px; background: var(--mid); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; font-size: 13px; gap: 8px; }
  .history-players { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .history-score { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--yellow); min-width: 56px; text-align: center; }
  .winner-badge { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; background: rgba(45,158,86,0.2); border: 1px solid rgba(45,158,86,0.4); color: var(--green-light); padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .action-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .edit-btn { background: none; border: 1px solid rgba(245,200,66,0.25); color: rgba(245,200,66,0.5); cursor: pointer; font-size: 13px; padding: 4px 9px; border-radius: 6px; transition: all 0.2s; }
  .edit-btn:hover { border-color: var(--yellow); color: var(--yellow); }
  .delete-btn { background: none; border: 1px solid rgba(255,80,80,0.25); color: rgba(255,100,100,0.5); cursor: pointer; font-size: 13px; padding: 4px 9px; border-radius: 6px; transition: all 0.2s; }
  .delete-btn:hover { border-color: #ff6060; color: #ff6060; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--mid); border: 1px solid var(--border); border-radius: 18px; padding: 28px; width: 100%; max-width: 420px; transform: translateY(20px); transition: transform 0.25s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--yellow); margin-bottom: 22px; }
  .modal-field { margin-bottom: 16px; }
  .modal-field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(240,237,228,0.4); margin-bottom: 8px; }
  .modal-field input, .modal-field select { background: var(--dark); border: 1px solid rgba(245,200,66,0.2); border-radius: 10px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 11px 14px; outline: none; width: 100%; transition: border-color 0.2s; color-scheme: dark; -moz-appearance: textfield; }
  .modal-field input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--yellow); }
  .modal-field select option { background: #1a1f17; }
  .modal-scores { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 16px; }
  .modal-vs { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: rgba(245,200,66,0.3); text-align: center; }
  .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
  .btn-save { flex: 1; padding: 13px; background: var(--green); border: none; border-radius: 10px; color: var(--white); font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; cursor: pointer; transition: background 0.2s; }
  .btn-save:hover { background: var(--green-light); }
  .btn-cancel { padding: 13px 20px; background: none; border: 1px solid var(--border); border-radius: 10px; color: rgba(240,237,228,0.5); font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; cursor: pointer; transition: border-color 0.2s; }
  .btn-cancel:hover { border-color: rgba(240,237,228,0.4); color: var(--white); }

  .empty-state { text-align: center; padding: 48px 20px; color: rgba(240,237,228,0.25); font-size: 14px; letter-spacing: 1px; }
  .empty-state .emoji { font-size: 36px; margin-bottom: 12px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--yellow); margin-bottom: 14px; }
  .btn-danger { background: none; border: 1px solid rgba(255,80,80,0.3); color: rgba(255,100,100,0.6); padding: 6px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .btn-danger:hover { border-color: rgba(255,80,80,0.7); color: #ff6060; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: white; padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 500; transition: transform 0.35s cubic-bezier(.34,1.56,.64,1); z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width:500px) {
    .lb-header, .lb-row { grid-template-columns: 30px 1fr repeat(3,50px); }
    .lb-header .col-gf, .lb-row .col-gf, .lb-header .col-ga, .lb-row .col-ga { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>FOOSBALL<br>LEAGUE</h1>
    <p>Track · Compete · Dominate</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('log',this)">Log Match</button>
    <button class="tab" onclick="switchTab('board',this)">Leaderboard</button>
    <button class="tab" onclick="switchTab('history',this)">History</button>
  </div>

  <!-- LOG MATCH -->
  <div id="panel-log" class="panel active">
    <div class="match-card">
      <h2>New Match</h2>
      <div class="date-row">
        <label>Match Date</label>
        <input type="date" id="match-date">
      </div>
      <div class="vs-row">
        <div class="player-col">
          <label>Player 1</label>
          <select id="p1-select" onchange="onPlayerChange()"><option value="">Select player</option></select>
          <label>Goals Scored</label>
          <input type="number" id="p1-score" min="0" max="99" placeholder="0">
        </div>
        <div class="vs-label">VS</div>
        <div class="player-col">
          <label>Player 2</label>
          <select id="p2-select" onchange="onPlayerChange()"><option value="">Select player</option></select>
          <label>Goals Scored</label>
          <input type="number" id="p2-score" min="0" max="99" placeholder="0">
        </div>
      </div>
      <button class="btn-primary" onclick="logMatch()">⚽ LOG MATCH</button>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div id="panel-board" class="panel">
    <div class="lb-toggle">
      <button class="lb-toggle-btn active" id="btn-perpetual" onclick="switchLB('perpetual')">All Time</button>
      <button class="lb-toggle-btn" id="btn-monthly" onclick="switchLB('monthly')">Monthly</button>
    </div>
    <div id="monthly-controls" style="display:none">
      <div class="month-selector">
        <span class="month-label">Month</span>
        <select id="month-select" onchange="renderLeaderboard()"></select>
      </div>
    </div>
    <div class="lb-header">
      <div>#</div><div>Player</div>
      <div style="text-align:center">W</div><div style="text-align:center">L</div>
      <div class="col-gf" style="text-align:center">GF</div>
      <div class="col-ga" style="text-align:center">GA</div>
      <div style="text-align:center">Win%</div>
    </div>
    <div id="leaderboard-rows"></div>
  </div>

  <!-- HISTORY -->
  <div id="panel-history" class="panel">
    <div class="flex-between">
      <div class="section-title">Match History</div>
      <button class="btn-danger" onclick="clearHistory()">Clear All</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Match</h3>
    <div class="modal-field">
      <label>Match Date</label>
      <input type="date" id="edit-date" color-scheme="dark">
    </div>
    <div class="modal-scores">
      <div class="modal-field" style="margin:0">
        <label id="edit-p1-label">Player 1</label>
        <input type="number" id="edit-s1" min="0" max="99" placeholder="0">
      </div>
      <div class="modal-vs">VS</div>
      <div class="modal-field" style="margin:0">
        <label id="edit-p2-label">Player 2</label>
        <input type="number" id="edit-s2" min="0" max="99" placeholder="0">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const PLAYERS = ["Rudhir", "Ravish", "Kapil"];
  let matches = JSON.parse(localStorage.getItem('foosball_matches_v2') || '[]');
  let lbMode = 'perpetual';
  let editIdx = -1;

  function save() { localStorage.setItem('foosball_matches_v2', JSON.stringify(matches)); }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'board') { populateMonthSelector(); renderLeaderboard(); }
    if (tab === 'history') renderHistory();
  }

  function switchLB(mode) {
    lbMode = mode;
    document.getElementById('btn-perpetual').classList.toggle('active', mode === 'perpetual');
    document.getElementById('btn-monthly').classList.toggle('active', mode === 'monthly');
    document.getElementById('monthly-controls').style.display = mode === 'monthly' ? 'block' : 'none';
    renderLeaderboard();
  }

  function populateMonthSelector() {
    const sel = document.getElementById('month-select');
    const months = new Set();
    matches.forEach(m => {
      const d = new Date(m.date);
      months.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    });
    const now = new Date();
    months.add(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
    const sorted = [...months].sort().reverse();
    const cur = sel.value;
    sel.innerHTML = '';
    sorted.forEach(m => {
      const [y, mo] = m.split('-');
      const label = new Date(y, mo-1).toLocaleString('default', { month:'long', year:'numeric' });
      const o = document.createElement('option');
      o.value = m; o.textContent = label;
      sel.appendChild(o);
    });
    if (cur && sorted.includes(cur)) sel.value = cur;
  }

  function populateSelects() {
    ['p1-select','p2-select'].forEach(id => {
      const s = document.getElementById(id);
      const cur = s.value;
      s.innerHTML = '<option value="">Select player</option>';
      PLAYERS.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; s.appendChild(o); });
      s.value = cur;
    });
    document.getElementById('match-date').value = new Date().toISOString().split('T')[0];
  }

  function onPlayerChange() {
    const p1 = document.getElementById('p1-select').value;
    const p2 = document.getElementById('p2-select').value;
    if (p1 && p2 && p1 === p2) { toast('Players must be different!'); document.getElementById('p2-select').value = ''; }
  }

  function logMatch() {
    const p1 = document.getElementById('p1-select').value;
    const p2 = document.getElementById('p2-select').value;
    const s1 = parseInt(document.getElementById('p1-score').value);
    const s2 = parseInt(document.getElementById('p2-score').value);
    const date = document.getElementById('match-date').value;
    if (!date) return toast('Please select a match date');
    if (!p1 || !p2) return toast('Select both players');
    if (p1 === p2) return toast('Players must be different');
    if (isNaN(s1) || isNaN(s2)) return toast('Enter scores for both players');
    if (s1 < 0 || s2 < 0) return toast('Scores must be 0 or more');
    if (s1 === s2) return toast('No draws — must have a winner!');
    const winner = s1 > s2 ? p1 : p2;
    matches.push({ p1, p2, s1, s2, winner, date, loggedAt: Date.now() });
    save();
    document.getElementById('p1-score').value = '';
    document.getElementById('p2-score').value = '';
    document.getElementById('p1-select').value = '';
    document.getElementById('p2-select').value = '';
    toast(`✅ ${winner} wins!`);
  }

  // EDIT
  function openEdit(idx) {
    editIdx = idx;
    const m = matches[idx];
    document.getElementById('edit-date').value = m.date;
    document.getElementById('edit-p1-label').textContent = m.p1;
    document.getElementById('edit-p2-label').textContent = m.p2;
    document.getElementById('edit-s1').value = m.s1;
    document.getElementById('edit-s2').value = m.s2;
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editIdx = -1;
  }

  function saveEdit() {
    const s1 = parseInt(document.getElementById('edit-s1').value);
    const s2 = parseInt(document.getElementById('edit-s2').value);
    const date = document.getElementById('edit-date').value;
    if (!date) return toast('Please select a date');
    if (isNaN(s1) || isNaN(s2)) return toast('Enter both scores');
    if (s1 < 0 || s2 < 0) return toast('Scores must be 0 or more');
    if (s1 === s2) return toast('No draws — must have a winner!');
    const m = matches[editIdx];
    m.s1 = s1; m.s2 = s2; m.date = date;
    m.winner = s1 > s2 ? m.p1 : m.p2;
    save();
    closeModal();
    renderHistory();
    toast('✅ Match updated!');
  }

  // Close modal on overlay click
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  function deleteMatch(idx) {
    if (confirm('Delete this match?')) {
      matches.splice(idx, 1);
      save();
      renderHistory();
      toast('Match deleted');
    }
  }

  function getStats(filteredMatches) {
    const stats = {};
    PLAYERS.forEach(p => stats[p] = { w:0, l:0, gf:0, ga:0 });
    filteredMatches.forEach(m => {
      stats[m.p1].gf += m.s1; stats[m.p1].ga += m.s2;
      stats[m.p2].gf += m.s2; stats[m.p2].ga += m.s1;
      if (m.winner === m.p1) { stats[m.p1].w++; stats[m.p2].l++; }
      else { stats[m.p2].w++; stats[m.p1].l++; }
    });
    return stats;
  }

  function renderLeaderboard() {
    let filtered = matches;
    if (lbMode === 'monthly') {
      const sel = document.getElementById('month-select').value;
      if (sel) {
        const [y, mo] = sel.split('-').map(Number);
        filtered = matches.filter(m => { const d = new Date(m.date); return d.getFullYear()===y && d.getMonth()+1===mo; });
      }
    }
    const stats = getStats(filtered);
    const sorted = PLAYERS.slice().sort((a,b) => {
      const ga = stats[a].w+stats[a].l, gb = stats[b].w+stats[b].l;
      const pA = ga ? stats[a].w/ga : 0, pB = gb ? stats[b].w/gb : 0;
      if (pB !== pA) return pB - pA;
      return (stats[b].gf-stats[b].ga) - (stats[a].gf-stats[a].ga);
    });
    const container = document.getElementById('leaderboard-rows');
    container.innerHTML = '';
    if (!filtered.length) { container.innerHTML = '<div class="empty-state"><div class="emoji">🏆</div>No matches for this period</div>'; return; }
    sorted.forEach((p,i) => {
      const s = stats[p];
      const games = s.w+s.l;
      const pct = games ? Math.round(s.w/games*100) : 0;
      const row = document.createElement('div');
      row.className = 'lb-row' + (i===0 ? ' gold' : '');
      row.innerHTML = `
        <div class="rank">${i===0?'🥇':i+1}</div>
        <div class="lb-name">${p}</div>
        <div class="lb-stat highlight">${s.w}</div>
        <div class="lb-stat">${s.l}</div>
        <div class="lb-stat col-gf">${s.gf}</div>
        <div class="lb-stat col-ga">${s.ga}</div>
        <div class="lb-stat">${pct}%</div>
        <div class="win-bar-wrap"><div class="win-bar" style="width:${pct}%"></div></div>`;
      container.appendChild(row);
    });
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    if (!matches.length) { list.innerHTML = '<div class="empty-state"><div class="emoji">📋</div>No matches logged yet</div>'; return; }
    const grouped = {};
    [...matches].sort((a,b) => new Date(b.date)-new Date(a.date)||b.loggedAt-a.loggedAt)
      .forEach(m => { if (!grouped[m.date]) grouped[m.date]=[]; grouped[m.date].push(m); });

    Object.entries(grouped).forEach(([date, dayMatches]) => {
      const d = new Date(date+'T12:00:00');
      const label = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
      const g = document.createElement('div');
      g.className = 'history-group-label';
      g.textContent = label + ` · ${dayMatches.length} match${dayMatches.length>1?'es':''}`;
      list.appendChild(g);

      dayMatches.forEach(m => {
        const idx = matches.indexOf(m);
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
          <div class="history-players">
            <span>${m.p1}</span>
            <div class="history-score">${m.s1} – ${m.s2}</div>
            <span>${m.p2}</span>
          </div>
          <span class="winner-badge">W: ${m.winner}</span>
          <div class="action-btns">
            <button class="edit-btn" onclick="openEdit(${idx})">✏️ Edit</button>
            <button class="delete-btn" onclick="deleteMatch(${idx})">✕ Delete</button>
          </div>`;
        list.appendChild(item);
      });
    });
  }

  function clearHistory() {
    if (!matches.length) return toast('No history to clear');
    if (confirm('Clear ALL match history? This cannot be undone.')) { matches=[]; save(); renderHistory(); toast('History cleared'); }
  }

  populateSelects();
</script>


</body></html>
