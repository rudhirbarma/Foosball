<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foosball League</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --green: #1a6b3a;
    --green-light: #2d9e56;
    --green-bg: #edf7f1;
    --yellow: #d4a017;
    --yellow-bg: #fdf8ee;
    --white: #ffffff;
    --bg: #f4f6f3;
    --card: #ffffff;
    --mid: #f0f4f1;
    --text: #1a2318;
    --text-muted: #6b7c6a;
    --border: rgba(26,107,58,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 28px 16px 60px; }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(44px,10vw,80px); color: var(--green); letter-spacing: 4px; line-height: 0.9; }
  .header p { color: var(--text-muted); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }
  .sync-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; font-size: 12px; letter-spacing: 1px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
  .sync-dot.connected { background: var(--green-light); box-shadow: 0 0 6px var(--green-light); }
  .sync-dot.error { background: #e53935; }
  .sync-label { color: var(--text-muted); text-transform: uppercase; font-size: 11px; letter-spacing: 1.5px; }
  .tabs { display: flex; gap: 4px; background: var(--mid); border-radius: 12px; padding: 4px; margin-bottom: 24px; border: 1px solid var(--border); }
  .tab { flex: 1; padding: 10px 6px; background: none; border: none; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 9px; transition: all 0.2s; }
  .tab.active { background: var(--green); color: #fff; }
  .panel { display: none; } .panel.active { display: block; }
  .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .match-card h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--green); margin-bottom: 20px; }
  .field-label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
  .date-row { margin-bottom: 18px; }
  .date-row input[type=date] { background: var(--mid); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 11px 14px; outline: none; width: 100%; transition: border-color 0.2s; }
  .date-row input[type=date]:focus { border-color: var(--green); }
  .vs-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: center; margin-bottom: 20px; }
  .player-col { display: flex; flex-direction: column; gap: 10px; }
  .player-col select, .player-col input[type=number] { background: var(--mid); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 11px 14px; outline: none; transition: border-color 0.2s; width: 100%; -moz-appearance: textfield; }
  .player-col select:focus, .player-col input[type=number]:focus { border-color: var(--green); }
  .player-col input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .vs-label { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--text-muted); letter-spacing: 2px; text-align: center; opacity: 0.4; }
  .btn-primary { width: 100%; padding: 14px; background: var(--green); border: none; border-radius: 10px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
  .btn-primary:hover { background: var(--green-light); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .lb-toggle { display: flex; gap: 4px; background: var(--mid); border-radius: 10px; padding: 4px; margin-bottom: 20px; border: 1px solid var(--border); width: fit-content; }
  .lb-toggle-btn { padding: 8px 18px; background: none; border: none; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 7px; transition: all 0.2s; }
  .lb-toggle-btn.active { background: var(--green); color: #fff; }
  .month-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .month-selector select { background: var(--mid); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 12px; outline: none; }
  .month-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  .lb-header { display: grid; grid-template-columns: 40px 1fr repeat(5,60px); gap: 8px; padding: 0 16px 10px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); margin-bottom: 6px; }
  .lb-row { display: grid; grid-template-columns: 40px 1fr repeat(5,60px); gap: 8px; align-items: center; padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; position: relative; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
  .lb-row.gold { border-color: rgba(212,160,23,0.5); background: var(--yellow-bg); }
  .lb-row.gold::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--yellow); border-radius: 2px 0 0 2px; }
  .rank { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--text-muted); text-align: center; opacity: 0.5; }
  .lb-row.gold .rank { color: var(--yellow); opacity: 1; }
  .lb-name { font-weight: 500; font-size: 15px; color: var(--text); }
  .lb-row.gold .lb-name { color: var(--green); font-weight: 600; }
  .lb-stat { text-align: center; font-size: 14px; color: var(--text-muted); }
  .lb-stat.highlight { color: var(--green); font-weight: 600; }
  .win-bar-wrap { grid-column: span 7; height: 3px; background: rgba(0,0,0,0.07); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .win-bar { height: 100%; background: linear-gradient(90deg, var(--green-light), var(--yellow)); border-radius: 2px; transition: width 0.6s ease; }
  .history-group-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: 14px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .history-item { display: flex; align-items: center; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; font-size: 13px; gap: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .history-players { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; color: var(--text); }
  .history-score { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--green); min-width: 56px; text-align: center; }
  .winner-badge { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; background: var(--green-bg); border: 1px solid rgba(26,107,58,0.25); color: var(--green); padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .action-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .edit-btn { background: none; border: 1px solid rgba(212,160,23,0.35); color: var(--yellow); cursor: pointer; font-size: 13px; padding: 4px 9px; border-radius: 6px; transition: all 0.2s; }
  .edit-btn:hover { background: var(--yellow-bg); border-color: var(--yellow); }
  .delete-btn { background: none; border: 1px solid rgba(229,57,53,0.25); color: #e53935; cursor: pointer; font-size: 13px; padding: 4px 9px; border-radius: 6px; transition: all 0.2s; opacity: 0.7; }
  .delete-btn:hover { opacity: 1; background: #fff5f5; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 28px; width: 100%; max-width: 420px; transform: translateY(20px); transition: transform 0.25s; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--green); margin-bottom: 22px; }
  .modal-field { margin-bottom: 16px; }
  .modal-field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .modal-field input { background: var(--mid); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 11px 14px; outline: none; width: 100%; transition: border-color 0.2s; -moz-appearance: textfield; }
  .modal-field input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .modal-field input:focus { border-color: var(--green); }
  .modal-scores { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 16px; }
  .modal-vs { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text-muted); text-align: center; opacity: 0.3; }
  .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
  .btn-save { flex: 1; padding: 13px; background: var(--green); border: none; border-radius: 10px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; cursor: pointer; transition: background 0.2s; }
  .btn-save:hover { background: var(--green-light); }
  .btn-cancel { padding: 13px 20px; background: var(--mid); border: 1px solid var(--border); border-radius: 10px; color: var(--text-muted); font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; cursor: pointer; }
  .btn-cancel:hover { background: #e8ece9; }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 14px; }
  .empty-state .emoji { font-size: 36px; margin-bottom: 12px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--green); margin-bottom: 14px; }
  .btn-danger { background: none; border: 1px solid rgba(229,57,53,0.3); color: #e53935; padding: 6px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; opacity: 0.7; transition: all 0.2s; }
  .btn-danger:hover { opacity: 1; background: #fff5f5; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: white; padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 500; transition: transform 0.35s cubic-bezier(.34,1.56,.64,1); z-index: 999; white-space: nowrap; box-shadow: 0 4px 20px rgba(26,107,58,0.3); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width:500px) {
    .lb-header, .lb-row { grid-template-columns: 30px 1fr repeat(3,50px); }
    .lb-header .col-gf, .lb-row .col-gf, .lb-header .col-ga, .lb-row .col-ga { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>FOOSBALL<br>LEAGUE</h1>
    <p>Track · Compete · Dominate</p>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-label" id="sync-label">Connecting...</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('log',this)">Log Match</button>
    <button class="tab" onclick="switchTab('board',this)">Leaderboard</button>
    <button class="tab" onclick="switchTab('history',this)">History</button>
  </div>

  <div id="panel-log" class="panel active">
    <div class="match-card">
      <h2>New Match</h2>
      <div class="date-row">
        <label class="field-label">Match Date</label>
        <input type="date" id="match-date">
      </div>
      <div class="vs-row">
        <div class="player-col">
          <label class="field-label">Player 1</label>
          <select id="p1-select" onchange="onPlayerChange()">
            <option value="">Select player</option>
            <option>Rudhir</option><option>Ravish</option><option>Kapil</option>
          </select>
          <label class="field-label">Goals Scored</label>
          <input type="number" id="p1-score" min="0" max="99" placeholder="0">
        </div>
        <div class="vs-label">VS</div>
        <div class="player-col">
          <label class="field-label">Player 2</label>
          <select id="p2-select" onchange="onPlayerChange()">
            <option value="">Select player</option>
            <option>Rudhir</option><option>Ravish</option><option>Kapil</option>
          </select>
          <label class="field-label">Goals Scored</label>
          <input type="number" id="p2-score" min="0" max="99" placeholder="0">
        </div>
      </div>
      <button class="btn-primary" id="log-btn" onclick="logMatch()">⚽ LOG MATCH</button>
    </div>
  </div>

  <div id="panel-board" class="panel">
    <div class="lb-toggle">
      <button class="lb-toggle-btn active" id="btn-perpetual" onclick="switchLB('perpetual')">All Time</button>
      <button class="lb-toggle-btn" id="btn-monthly" onclick="switchLB('monthly')">Monthly</button>
    </div>
    <div id="monthly-controls" style="display:none">
      <div class="month-selector">
        <span class="month-label">Month</span>
        <select id="month-select" onchange="renderLeaderboard()"></select>
      </div>
    </div>
    <div class="lb-header">
      <div>#</div><div>Player</div>
      <div style="text-align:center">W</div><div style="text-align:center">L</div>
      <div class="col-gf" style="text-align:center">GF</div>
      <div class="col-ga" style="text-align:center">GA</div>
      <div style="text-align:center">Win%</div>
    </div>
    <div id="leaderboard-rows"></div>
  </div>

  <div id="panel-history" class="panel">
    <div class="flex-between">
      <div class="section-title">Match History</div>
      <button class="btn-danger" onclick="clearHistory()">Clear All</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Match</h3>
    <div class="modal-field">
      <label>Match Date</label>
      <input type="date" id="edit-date">
    </div>
    <div class="modal-scores">
      <div class="modal-field" style="margin:0">
        <label id="edit-p1-label">Player 1</label>
        <input type="number" id="edit-s1" min="0" max="99" placeholder="0">
      </div>
      <div class="modal-vs">VS</div>
      <div class="modal-field" style="margin:0">
        <label id="edit-p2-label">Player 2</label>
        <input type="number" id="edit-s2" min="0" max="99" placeholder="0">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBn4i5LugpsgBXlVukC13W1S-w0c_6bOe4",
    authDomain: "foosball-949e1.firebaseapp.com",
    projectId: "foosball-949e1",
    storageBucket: "foosball-949e1.firebasestorage.app",
    messagingSenderId: "159586672912",
    appId: "1:159586672912:web:67c6351a7d407506980595"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const PLAYERS = ["Rudhir", "Ravish", "Kapil"];
  let matches = [];
  let lbMode = 'perpetual';
  let editId = null;

  document.getElementById('match-date').value = new Date().toISOString().split('T')[0];

  function setSync(status) {
    const dot = document.getElementById('sync-dot');
    const label = document.getElementById('sync-label');
    dot.className = 'sync-dot ' + status;
    label.textContent = status === 'connected' ? 'Live · Shared' : status === 'error' ? 'Offline' : 'Connecting...';
  }

  window.toast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  const q = query(collection(db, "matches"), orderBy("loggedAt", "desc"));
  onSnapshot(q, (snapshot) => {
    matches = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    setSync('connected');
    const activePanel = document.querySelector('.panel.active').id;
    if (activePanel === 'panel-board') { populateMonthSelector(); renderLeaderboard(); }
    if (activePanel === 'panel-history') renderHistory();
  }, (err) => { setSync('error'); console.error(err); });

  window.switchTab = function(tab, el) {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'board') { populateMonthSelector(); renderLeaderboard(); }
    if (tab === 'history') renderHistory();
  }

  window.switchLB = function(mode) {
    lbMode = mode;
    document.getElementById('btn-perpetual').classList.toggle('active', mode === 'perpetual');
    document.getElementById('btn-monthly').classList.toggle('active', mode === 'monthly');
    document.getElementById('monthly-controls').style.display = mode === 'monthly' ? 'block' : 'none';
    renderLeaderboard();
  }

  window.onPlayerChange = function() {
    const p1 = document.getElementById('p1-select').value;
    const p2 = document.getElementById('p2-select').value;
    if (p1 && p2 && p1 === p2) { toast('Players must be different!'); document.getElementById('p2-select').value = ''; }
  }

  window.logMatch = async function() {
    const p1 = document.getElementById('p1-select').value;
    const p2 = document.getElementById('p2-select').value;
    const s1 = parseInt(document.getElementById('p1-score').value);
    const s2 = parseInt(document.getElementById('p2-score').value);
    const date = document.getElementById('match-date').value;
    if (!date) return toast('Please select a match date');
    if (!p1 || !p2) return toast('Select both players');
    if (p1 === p2) return toast('Players must be different');
    if (isNaN(s1) || isNaN(s2)) return toast('Enter scores for both players');
    if (s1 < 0 || s2 < 0) return toast('Scores must be 0 or more');
    if (s1 === s2) return toast('No draws — must have a winner!');
    const winner = s1 > s2 ? p1 : p2;
    const btn = document.getElementById('log-btn');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      await addDoc(collection(db, "matches"), { p1, p2, s1, s2, winner, date, loggedAt: Date.now() });
      document.getElementById('p1-score').value = '';
      document.getElementById('p2-score').value = '';
      document.getElementById('p1-select').value = '';
      document.getElementById('p2-select').value = '';
      toast(`✅ ${winner} wins!`);
    } catch(e) { toast('Error saving — check connection'); console.error(e); }
    btn.disabled = false; btn.textContent = '⚽ LOG MATCH';
  }

  function populateMonthSelector() {
    const sel = document.getElementById('month-select');
    const months = new Set();
    matches.forEach(m => {
      const d = new Date(m.date);
      months.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    });
    const now = new Date();
    months.add(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
    const sorted = [...months].sort().reverse();
    const cur = sel.value;
    sel.innerHTML = '';
    sorted.forEach(m => {
      const [y, mo] = m.split('-');
      const label = new Date(y, mo-1).toLocaleString('default', { month:'long', year:'numeric' });
      const o = document.createElement('option');
      o.value = m; o.textContent = label;
      sel.appendChild(o);
    });
    if (cur && sorted.includes(cur)) sel.value = cur;
  }

  function getStats(filteredMatches) {
    const stats = {};
    PLAYERS.forEach(p => stats[p] = { w:0, l:0, gf:0, ga:0 });
    filteredMatches.forEach(m => {
      if (!stats[m.p1] || !stats[m.p2]) return;
      stats[m.p1].gf += m.s1; stats[m.p1].ga += m.s2;
      stats[m.p2].gf += m.s2; stats[m.p2].ga += m.s1;
      if (m.winner === m.p1) { stats[m.p1].w++; stats[m.p2].l++; }
      else { stats[m.p2].w++; stats[m.p1].l++; }
    });
    return stats;
  }

  function renderLeaderboard() {
    let filtered = matches;
    if (lbMode === 'monthly') {
      const sel = document.getElementById('month-select').value;
      if (sel) {
        const [y, mo] = sel.split('-').map(Number);
        filtered = matches.filter(m => { const d = new Date(m.date); return d.getFullYear()===y && d.getMonth()+1===mo; });
      }
    }
    const stats = getStats(filtered);
    const sorted = PLAYERS.slice().sort((a,b) => {
      const ga = stats[a].w+stats[a].l, gb = stats[b].w+stats[b].l;
      const pA = ga ? stats[a].w/ga : 0, pB = gb ? stats[b].w/gb : 0;
      if (pB !== pA) return pB - pA;
      return (stats[b].gf-stats[b].ga) - (stats[a].gf-stats[a].ga);
    });
    const container = document.getElementById('leaderboard-rows');
    container.innerHTML = '';
    if (!filtered.length) { container.innerHTML = '<div class="empty-state"><div class="emoji">🏆</div>No matches for this period</div>'; return; }
    sorted.forEach((p,i) => {
      const s = stats[p];
      const games = s.w+s.l;
      const pct = games ? Math.round(s.w/games*100) : 0;
      const row = document.createElement('div');
      row.className = 'lb-row' + (i===0 ? ' gold' : '');
      row.innerHTML = `
        <div class="rank">${i===0?'🥇':i+1}</div>
        <div class="lb-name">${p}</div>
        <div class="lb-stat highlight">${s.w}</div>
        <div class="lb-stat">${s.l}</div>
        <div class="lb-stat col-gf">${s.gf}</div>
        <div class="lb-stat col-ga">${s.ga}</div>
        <div class="lb-stat">${pct}%</div>
        <div class="win-bar-wrap"><div class="win-bar" style="width:${pct}%"></div></div>`;
      container.appendChild(row);
    });
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    if (!matches.length) { list.innerHTML = '<div class="empty-state"><div class="emoji">📋</div>No matches logged yet</div>'; return; }
    const grouped = {};
    [...matches].sort((a,b) => new Date(b.date)-new Date(a.date) || b.loggedAt-a.loggedAt)
      .forEach(m => { if (!grouped[m.date]) grouped[m.date]=[]; grouped[m.date].push(m); });
    Object.entries(grouped).forEach(([date, dayMatches]) => {
      const d = new Date(date+'T12:00:00');
      const label = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
      const g = document.createElement('div');
      g.className = 'history-group-label';
      g.textContent = label + ` · ${dayMatches.length} match${dayMatches.length>1?'es':''}`;
      list.appendChild(g);
      dayMatches.forEach(m => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
          <div class="history-players">
            <span>${m.p1}</span>
            <div class="history-score">${m.s1} – ${m.s2}</div>
            <span>${m.p2}</span>
          </div>
          <span class="winner-badge">W: ${m.winner}</span>
          <div class="action-btns">
            <button class="edit-btn" onclick="openEdit('${m.id}','${m.p1}','${m.p2}',${m.s1},${m.s2},'${m.date}')">✏️ Edit</button>
            <button class="delete-btn" onclick="deleteMatch('${m.id}')">✕ Delete</button>
          </div>`;
        list.appendChild(item);
      });
    });
  }

  window.openEdit = function(id, p1, p2, s1, s2, date) {
    editId = id;
    document.getElementById('edit-p1-label').textContent = p1;
    document.getElementById('edit-p2-label').textContent = p2;
    document.getElementById('edit-s1').value = s1;
    document.getElementById('edit-s2').value = s2;
    document.getElementById('edit-date').value = date;
    document.getElementById('edit-modal').classList.add('open');
  }

  window.closeModal = function() {
    document.getElementById('edit-modal').classList.remove('open');
    editId = null;
  }

  window.saveEdit = async function() {
    const s1 = parseInt(document.getElementById('edit-s1').value);
    const s2 = parseInt(document.getElementById('edit-s2').value);
    const date = document.getElementById('edit-date').value;
    if (!date) return toast('Please select a date');
    if (isNaN(s1) || isNaN(s2)) return toast('Enter both scores');
    if (s1 < 0 || s2 < 0) return toast('Scores must be 0 or more');
    if (s1 === s2) return toast('No draws — must have a winner!');
    const m = matches.find(x => x.id === editId);
    if (!m) return;
    try {
      await updateDoc(doc(db, "matches", editId), { s1, s2, date, winner: s1 > s2 ? m.p1 : m.p2 });
      closeModal();
      toast('✅ Match updated!');
    } catch(e) { toast('Error updating — check connection'); }
  }

  window.deleteMatch = async function(id) {
    if (!confirm('Delete this match?')) return;
    try {
      await deleteDoc(doc(db, "matches", id));
      toast('Match deleted');
    } catch(e) { toast('Error deleting — check connection'); }
  }

  window.clearHistory = async function() {
    if (!matches.length) return toast('No history to clear');
    if (!confirm('Clear ALL match history? This cannot be undone.')) return;
    try {
      await Promise.all(matches.map(m => deleteDoc(doc(db, "matches", m.id))));
      toast('History cleared');
    } catch(e) { toast('Error clearing — check connection'); }
  }

  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
